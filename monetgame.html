<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>金融生存戰 - 學生端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-900 text-white p-4">
    <div id="login-screen" class="fixed inset-0 bg-gray-900 z-50 flex items-center justify-center p-6">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-yellow-500 mb-6">錢進 CingSi</h1>
            <input id="player-name" type="text" placeholder="請輸入你的姓名" class="w-full p-3 rounded bg-gray-700 mb-4 border border-gray-600 focus:outline-none focus:border-yellow-500">
            <button onclick="startGame()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 rounded-lg text-xl">進入市場</button>
        </div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h2 id="display-name" class="text-xl font-bold text-yellow-500 text-ellipsis overflow-hidden">玩家</h2>
            <div id="timer" class="text-sm bg-red-900 px-3 py-1 rounded-full">黑天鵝倒數: 10s</div>
        </header>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-gray-800 p-3 rounded text-center border-b-4 border-green-500">
                <p class="text-xs text-gray-400">科技股</p>
                <p id="price-tech" class="text-xl font-mono">$100</p>
            </div>
            <div class="bg-gray-800 p-3 rounded text-center border-b-4 border-blue-500">
                <p class="text-xs text-gray-400">能源股</p>
                <p id="price-energy" class="text-xl font-mono">$100</p>
            </div>
        </div>

        <div class="bg-gray-800 p-5 rounded-xl mb-6 shadow-inner">
            <div class="flex justify-between mb-4">
                <div><p class="text-gray-400 text-sm">現金</p><p id="player-cash" class="text-2xl font-bold">$1000</p></div>
                <div class="text-right"><p class="text-gray-400 text-sm">總資產</p><p id="player-net" class="text-2xl font-bold text-green-400">$1000</p></div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="buy('tech')" class="bg-green-600 py-3 rounded font-bold">買科技</button>
                <button onclick="buy('energy')" class="bg-blue-600 py-3 rounded font-bold">買能源</button>
                <button onclick="sellAll()" class="col-span-2 bg-red-600 py-2 mt-2 rounded font-bold">緊急清倉</button>
            </div>
        </div>

        <div id="event-log" class="text-xs font-mono text-gray-500 h-24 overflow-y-auto bg-black p-2 rounded">
            > 準備交易...
        </div>
    </div>

    <script>
        // --- Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyC22jClkL3BnJifDpAaaz40kmyKEMZravY",
            authDomain: "csps-899f4.firebaseapp.com",
            databaseURL: "https://csps-899f4-default-rtdb.firebaseio.com",
            projectId: "csps-899f4",
            storageBucket: "csps-899f4.firebasestorage.app",
            appId: "1:719907049932:web:e7a8ac6b6dd04f11048d69"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let gameState = {
            name: "",
            timeLeft: 10,
            prices: { tech: 100, energy: 100 },
            player: { cash: 1000, inv: { tech: 0, energy: 0 } }
        };

        function startGame() {
            const nameInput = document.getElementById('player-name').value.trim();
            if(!nameInput) return alert("請輸入名字");
            gameState.name = nameInput;
            document.getElementById('display-name').innerText = "交易員: " + nameInput;
            document.getElementById('login-screen').classList.add('hidden');
            startLoop();
        }

        function startLoop() {
            setInterval(() => {
                gameState.timeLeft--;
                if(gameState.timeLeft <= 0) {
                    // 模擬黑天鵝隨機波波
                    if(Math.random() > 0.7) {
                        const target = Math.random() > 0.5 ? 'tech' : 'energy';
                        gameState.prices[target] *= (0.4 + Math.random());
                        log(`市場震撼發生！價格劇烈變動`);
                    }
                    gameState.timeLeft = 10;
                }
                // 自然波動
                gameState.prices.tech *= (0.98 + Math.random() * 0.04);
                gameState.prices.energy *= (0.98 + Math.random() * 0.04);
                
                updateUI();
                syncToFirebase();
            }, 1000);
        }

        function updateUI() {
            document.getElementById('price-tech').innerText = `$${gameState.prices.tech.toFixed(0)}`;
            document.getElementById('price-energy').innerText = `$${gameState.prices.energy.toFixed(0)}`;
            document.getElementById('player-cash').innerText = `$${gameState.player.cash.toFixed(0)}`;
            document.getElementById('timer').innerText = `黑天鵝倒數: ${gameState.timeLeft}s`;
            
            let net = gameState.player.cash + (gameState.player.inv.tech * gameState.prices.tech) + (gameState.player.inv.energy * gameState.prices.energy);
            document.getElementById('player-net').innerText = `$${net.toFixed(0)}`;
            return net;
        }

        function syncToFirebase() {
            let net = updateUI();
            db.ref('players/' + gameState.name).set({
                score: Math.floor(net),
                lastUpdate: Date.now()
            });
        }

        function buy(type) {
            if(gameState.player.cash >= gameState.prices[type]) {
                gameState.player.cash -= gameState.prices[type];
                gameState.player.inv[type]++;
                log(`買入 ${type}`);
            }
        }

        function sellAll() {
            gameState.player.cash += (gameState.player.inv.tech * gameState.prices.tech) + (gameState.player.inv.energy * gameState.prices.energy);
            gameState.player.inv = { tech: 0, energy: 0 };
            log("清倉大拍賣！");
        }

        function log(m) {
            const el = document.getElementById('event-log');
            el.innerHTML = `<div>> ${m}</div>` + el.innerHTML;
        }
    </script>
</body>
</html>
